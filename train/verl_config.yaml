# ============================================
# veRL GRPO 训练配置
# 模型: SFT + DPO 微调后的 Qwen2.5-7B
# 方法: GRPO (Group Relative Policy Optimization)
# ============================================
#
# GRPO 原理 (DeepSeek-R1 使用的方法):
#   1. 对每个 prompt 采样 G 个回答 (rollout)
#   2. 用 Reward Function 对每个回答打分
#   3. 用组内平均 reward 作为 baseline (替代 PPO 的 Critic)
#   4. 计算优势函数: A_i = (r_i - mean(r)) / std(r)
#   5. 用 PPO-clip 目标更新 Actor
#
# veRL 架构:
#   Actor (可训练) ──→ rollout 生成回答
#   Reference (冻结) ──→ 计算 KL 散度
#   Reward (规则函数) ──→ 对回答打分
#   注意: GRPO 不需要 Critic!

# ============================================
# 数据配置
# ============================================
data:
  tokenizer: null                           # 默认使用模型自带的 tokenizer
  train_files: data/grpo_prompts.parquet    # GRPO prompt 数据 (parquet 格式)
  val_files: null
  prompt_key: prompt                        # parquet 中 prompt 字段名
  max_prompt_length: 512
  max_response_length: 512
  train_batch_size: 64                      # 2×5090 显存有限，降低采样 batch
  shuffle: true
  seed: 42
  trust_remote_code: true

# ============================================
# Actor + Rollout + Reference 配置
# ============================================
actor_rollout_ref:
  hybrid_engine: true
  model:
    path: /root/autodl-tmp/ustc-qa-dpo-merged  # DPO 合并后的模型 (命令行可覆盖)
    trust_remote_code: true
    override_config:
      attn_implementation: flash_attention_2

  actor:
    strategy: fsdp                          # 并行策略
    ppo_mini_batch_size: 32                 # 数据量更大，mini-batch 适当缩小保证更新频率
    ppo_micro_batch_size_per_gpu: 2         # 2×5090 显存有限，降低 micro-batch
    ppo_epochs: 1                           # 每批数据的更新轮数
    clip_ratio: 0.2                         # PPO clip 比率
    entropy_coeff: 0.01                     # 熵正则化系数
    grad_clip: 1.0
    use_kl_loss: true                       # GRPO 使用 KL loss (不在 reward 中加 KL)
    kl_loss_coef: 0.002                     # 稍微增大 KL 系数，防止偏离 SFT+DPO 太远
    kl_loss_type: low_var_kl                # KL 散度计算方式
    use_torch_compile: false                # 7B 模型关闭 compile 更稳定
    optim:
      lr: 5.0e-7                            # 经过 SFT+DPO 后 GRPO lr 应更保守
      lr_warmup_steps: 20                   # 数据量更大，warmup 步数增加
      lr_scheduler_type: constant
      weight_decay: 0.01
    fsdp_config:
      param_offload: false
      optimizer_offload: false

  rollout:
    name: vllm                              # 使用 vLLM 做 rollout
    tensor_model_parallel_size: 1           # rollout 的 TP 大小
    gpu_memory_utilization: 0.4             # rollout 占用的 GPU 显存比例
    temperature: 0.7                        # 采样温度
    top_p: 0.9
    top_k: -1                               # vLLM 用 -1 表示不限制
    max_new_tokens: 512                     # 最大生成长度
    n: 4                                    # 每个 prompt 采样 G=4 个回答 (GRPO 核心)

  ref:
    strategy: fsdp
    log_prob_micro_batch_size_per_gpu: 8
    fsdp_config:
      param_offload: false

# ============================================
# Reward 配置 (规则奖励，不需要 Reward Model)
# ============================================
reward_model:
  enable: false

custom_reward:
  enable: true
  path: train/reward_function.py            # 自定义奖励函数路径
  function_name: compute_reward             # 入口函数名

# ============================================
# Trainer 配置
# ============================================
trainer:
  total_epochs: 3                           # 总训练轮数
  save_freq: 50                             # 每 50 步保存一次
  test_freq: 25                             # 每 25 步测试一次
  project_name: ustc-qa-grpo
  experiment_name: grpo-run
  default_local_dir: outputs/ustc-qa-grpo
  n_gpus_per_node: 2                        # 2×RTX 5090

# ============================================
# GRPO 算法配置
# ============================================
algorithm:
  gamma: 1.0                                # 折扣因子
  lam: 1.0                                  # GAE lambda
  adv_estimator: grpo                       # GRPO 优势估计

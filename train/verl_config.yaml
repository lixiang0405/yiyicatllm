# ============================================
# veRL GRPO 训练配置
# 模型: SFT + DPO 微调后的 Qwen2.5-7B
# 方法: GRPO (Group Relative Policy Optimization)
# ============================================

# 使用 veRL 默认配置作为基础，只覆盖需要自定义的字段
defaults:
  - model_engine: dp
  - actor@actor_rollout_ref.actor: ${model_engine}_actor
  - data@data: legacy_data
  - ref@actor_rollout_ref.ref: ${model_engine}_ref
  - rollout@actor_rollout_ref.rollout: rollout
  - model@actor_rollout_ref.model: hf_model
  - critic@critic: ${model_engine}_critic
  - model@critic.model: hf_model
  - legacy_reward_impl
  - reward@reward: reward
  - algorithm@algorithm.rollout_correction: rollout_correction
  - distillation@distillation: distillation
  - _self_

# ============================================
# 数据配置
# ============================================
data:
  train_files: data/grpo_prompts.parquet
  val_files: null
  prompt_key: prompt
  max_prompt_length: 512
  max_response_length: 512
  train_batch_size: 64
  shuffle: true
  seed: 42
  trust_remote_code: true

# ============================================
# Actor + Rollout + Reference 配置
# ============================================
actor_rollout_ref:
  hybrid_engine: true

  model:
    path: /root/autodl-tmp/ustc-qa-dpo-merged
    trust_remote_code: true
    override_config:
      attn_implementation: flash_attention_2

  actor:
    strategy: fsdp
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 2
    ppo_epochs: 1
    clip_ratio: 0.2
    entropy_coeff: 0.01
    grad_clip: 1.0
    use_kl_loss: true
    kl_loss_coef: 0.002
    kl_loss_type: low_var_kl
    use_torch_compile: false
    optim:
      lr: 5.0e-7
      lr_warmup_steps: 20
      lr_scheduler_type: constant
      weight_decay: 0.01
    fsdp_config:
      param_offload: false
      optimizer_offload: false

  rollout:
    name: vllm
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.4
    temperature: 0.7
    top_p: 0.9
    top_k: -1
    max_new_tokens: 512
    n: 4

  ref:
    strategy: fsdp
    log_prob_micro_batch_size_per_gpu: 8
    fsdp_config:
      param_offload: false

# ============================================
# Reward 配置（规则奖励，不需要 Reward Model）
# ============================================
reward_model:
  enable: false

custom_reward_function:
  path: train/reward_function.py
  name: compute_reward

# ============================================
# Trainer 配置
# ============================================
trainer:
  total_epochs: 3
  save_freq: 50
  test_freq: 25
  project_name: ustc-qa-grpo
  experiment_name: grpo-run
  default_local_dir: outputs/ustc-qa-grpo
  n_gpus_per_node: 2
  logger: ["console"]

# ============================================
# GRPO 算法配置
# ============================================
algorithm:
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo

# Ray 配置
ray_kwargs:
  ray_init:
    num_cpus: null
  timeline_json_file: null

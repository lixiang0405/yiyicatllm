# ============================================
# LLaMA-Factory LoRA 微调配置
# 模型: Qwen2.5-7B
# 方法: LoRA + DeepSpeed ZeRO-2
# ============================================

### 模型配置
model_name_or_path: Qwen/Qwen2.5-7B
trust_remote_code: true

### 训练方法
stage: sft
do_train: true
finetuning_type: lora

### LoRA 配置
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all  # 对所有线性层应用 LoRA

### 数据配置
# 注意: 需要先在 LLaMA-Factory/data/dataset_info.json 中注册数据集
# 添加: "ustc_qa": {"file_name": "/path/to/yiyicat-llm/data/train_data.json"}
dataset: ustc_qa
dataset_dir: LLaMA-Factory/data
template: qwen
cutoff_len: 2048

### 训练超参数
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 10
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 1.0

### 混合精度
bf16: true

### DeepSpeed
deepspeed: train/ds_config_zero2.json

### 输出配置
output_dir: outputs/ustc-qa-lora
logging_steps: 5
save_steps: 100
save_total_limit: 3

### 其他
overwrite_output_dir: true
report_to: none  # 不使用 wandb，如需可改为 wandb
seed: 42
